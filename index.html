  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

flex;flex-direction:column;padding:8px 28px 18px;\">\n      <a href=\"#work\" onclick=\"{{ closeMenu }}\" style=\"color:#8A9683;padding:12px 0;border-bottom:1px solid #1E241C;\">./work<\u002Fa>\n      <a href=\"#skills\" onclick=\"{{ closeMenu }}\" style=\"color:#8A9683;padding:12px 0;border-bottom:1px solid #1E241C;\">./skills<\u002Fa>\n      <a href=\"#cv\" onclick=\"{{ closeMenu }}\" style=\"color:#8A9683;padding:12px 0;border-bottom:1px solid #1E241C;\">./cv<\u002Fa>\n      <a href=\"#contact\" onclick=\"{{ closeMenu }}\" style=\"color:#8A9683;padding:12px 0;\">./contact<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- HERO -->\n  <div style=\"position:relative;padding:72px 28px 40px;max-width:1060px;margin:0 auto;\">\n    <div style=\"animation:riseIn .7s cubic-bezier(.2,.7,.2,1) both;\">\n      <div style=\"font-size:12px;color:#C6F24E;letter-spacing:.2em;text-transform:uppercase;margin-bottom:18px;\">// Principal Full-Stack Engineer &amp; Technology Lead<\u002Fdiv>\n      <h1 style=\"font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 125,'wght' 900;font-size:clamp(52px,9.5vw,124px);line-height:.9;margin:0;color:#EFF6EA;text-transform:uppercase;letter-spacing:-.01em;\">Charles<br><span style=\"color:#0A0C09;-webkit-text-stroke:1.5px #4A5644;\">Phiri<\u002Fspan><\u002Fh1>\n      <div style=\"max-width:620px;margin:28px 0 0;display:flex;flex-direction:column;gap:14px;\">\n        <p style=\"font-size:14px;line-height:1.75;color:#8A9683;margin:0;\">Technology Lead and Principal Full-Stack Engineer with <span style=\"color:#EFF6EA;font-weight:700;\">13+ years<\u002Fspan> across the banking, mobile, advertising, and marketing industries — designing, building, and scaling complex, cloud-native platforms. My work sits where enterprise architecture meets hands-on, high-performance engineering: currently leading technical delivery and product design at enterprise scale, architecting <span style=\"color:#EFF6EA;font-weight:700;\">RAG-based assistants<\u002Fspan>, integrating AWS SageMaker, and designing blueprints aligned to Group Architecture standards.<\u002Fp>\n        <p style=\"font-size:14px;line-height:1.75;color:#8A9683;margin:0;\">Beyond full-stack development across Java, Angular, React, Node.js, Go, PHP, and Perl, I specialize in technical leadership and delivery — owning CI/CD and DevOps pipelines, running self-directed squad-based teams, managing budgets and vendor contracts, and mentoring senior engineers. The goal is always the same: <span style=\"color:#EFF6EA;font-weight:700;\">secure, cost-effective solutions that create real business value.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TERMINAL -->\n    <div style=\"margin-top:48px;border:1px solid #2A331F;background:#0D110B;box-shadow:0 0 0 1px rgba(198,242,78,.06),0 30px 80px -30px rgba(0,0,0,.9);animation:riseIn .7s .15s cubic-bezier(.2,.7,.2,1) both;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #1E241C;background:#10150D;\">\n        <div style=\"display:flex;gap:7px;\">\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#3A4434;\"><\u002Fspan>\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#3A4434;\"><\u002Fspan>\n          <span style=\"width:11px;height:11px;border-radius:50%;background:#C6F24E;\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:10px;color:#5C6656;letter-spacing:.1em;\">zsh — try: help · whoami · projects · skills · contact<\u002Fdiv>\n      <\u002Fdiv>\n      <div ref=\"{{ termBodyRef }}\" onclick=\"{{ focusInput }}\" style=\"padding:18px 20px;height:300px;overflow-y:auto;font-size:12.5px;line-height:1.7;cursor:text;\">\n        <sc-for list=\"{{ termLines }}\" as=\"ln\" hint-placeholder-count=\"3\">\n          <div style=\"{{ ln.style }}\">{{ ln.text }}<\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"display:flex;gap:8px;align-items:bas ; components<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px;\">\n              <sc-for list=\"{{ pr.components }}\" as=\"cm\" hint-placeholder-count=\"3\">\n                <div data-mq-stack=\"1\" style=\"display:grid;grid-template-columns:210px 1fr;gap:6px 16px;align-items:baseline;\">\n                  <div style=\"font-size:11.5px;color:#EFF6EA;font-weight:700;display:flex;gap:9px;align-items:baseline;\"><span style=\"color:#C6F24E;flex:none;\">◆<\u002Fspan>{{ cm.n }}<\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:#8A9683;line-height:1.65;\">{{ cm.d }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- WEBSITES -->\n  <div id=\"websites\" style=\"max-width:1060px;margin:0 auto;padding:80px 28px 20px;\">\n    <div data-reveal=\"1\" style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:26px;\">\n      <span style=\"color:#C6F24E;font-size:13px;\">03<\u002Fspan>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 115,'wght' 800;font-size:clamp(26px,4vw,40px);margin:0;color:#EFF6EA;text-transform:uppercase;\">Websites<\u002Fh2>\n      <span style=\"flex:1;height:1px;background:#1E241C;\"><\u002Fspan>\n    <\u002Fdiv>\n    <sc-for list=\"{{ websites }}\" as=\"ws\" hint-placeholder-count=\"2\">\n      <div data-reveal=\"1\" data-mq-stack=\"1\" style=\"display:grid;grid-template-columns:220px 1fr auto;gap:8px 18px;align-items:baseline;padding:18px 6px;border-bottom:1px solid #1E241C;\">\n        <span style=\"font-size:14px;font-weight:700;color:#EFF6EA;display:flex;gap:9px;align-items:baseline;\"><span style=\"color:#C6F24E;\">◆<\u002Fspan>{{ ws.n }}<\u002Fspan>\n        <span style=\"font-size:12px;color:#8A9683;line-height:1.65;\">{{ ws.d }}<\u002Fspan>\n        <span style=\"font-size:10px;color:#C6F24E;letter-spacing:.1em;text-transform:uppercase;border:1px solid #2A331F;padding:4px 9px;white-space:nowrap;\">{{ ws.t }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- EXPERIENCE -->\n  <div id=\"cv\" style=\"max-width:1060px;margin:0 auto;padding:80px 28px 20px;\">\n    <div data-reveal=\"1\" style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:26px;\">\n      <span style=\"color:#C6F24E;font-size:13px;\">04<\u002Fspan>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 115,'wght' 800;font-size:clamp(26px,4vw,40px);margin:0;color:#EFF6EA;text-transform:uppercase;\">Career Log<\u002Fh2>\n      <span style=\"flex:1;height:1px;background:#1E241C;\"><\u002Fspan>\n    <\u002Fdiv>\n    <sc-for list=\"{{ jobs }}\" as=\"jb\" hint-placeholder-count=\"4\">\n      <div data-reveal=\"1\" data-mq-stack=\"1\" style=\"display:grid;grid-template-columns:280px 1fr;gap:10px 22px;padding:20px 6px;border-bottom:1px solid #1E241C;align-items:start;\">\n        <div>\n          <div style=\"font-size:14px;font-weight:700;color:#EFF6EA;line-height:1.35;\">{{ jb.role }}<\u002Fdiv>\n          <div style=\"font-size:11px;color:#C6F24E;margin-top:5px;\">{{ jb.co }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px;color:#8A9683;line-height:1.7;\">{{ jb.d }}<\u002Fdiv>\n          <div style=\"font-size:10.5px;color:#5C6656;margin-top:8px;letter-spacing:.02em;\">{{ jb.tech }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- EDUCATION -->\n  <div style=\"max-width:1060px;margin:0 auto;padding:80px 28px 20px;\">\n    <div data-reveal=\"1\" style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:26px;\">\n      <span style=\"color:#C6F24E;font-size:13px;\">05<\u002Fspan>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 115,'wght' 800;font-size:clamp(26px,4vw,40px);margin:0;color:#EFF6EA;text-transform:uppercase;\">Educati v 2026.07 — variation A / terminal<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;scanlines&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Effects&quot;}}\">\nclass Component extends DCLogic {\n  static techIcons = [\n    { slug: 'openjdk', label: 'Java' },\n    { slug: 'spring', label: 'Spring Boot' },\n    { slug: 'nodedotjs', label: 'Node.js' },\n    { slug: 'nestjs', label: 'NestJS' },\n    { slug: 'typescript', label: 'TypeScript' },\n    { slug: 'javascript', label: 'JavaScript' },\n    { slug: 'react', label: 'React' },\n    { slug: 'angular', label: 'Angular' },\n    { slug: 'go', label: 'Go' },\n    { slug: 'php', label: 'PHP' },\n    { slug: 'laravel', label: 'Laravel' },\n    { slug: 'perl', label: 'Perl' },\n    { slug: 'dotnet', label: '.NET' },\n    { slug: 'mysql', label: 'MySQL' },\n    { slug: 'postgresql', label: 'PostgreSQL' },\n    { slug: 'rabbitmq', label: 'RabbitMQ' },\n    { slug: 'docker', label: 'Docker' },\n    { slug: 'rancher', label: 'Rancher' },\n    { slug: 'redhatopenshift', label: 'OpenShift' },\n    { slug: 'jenkins', label: 'Jenkins' },\n    { slug: 'git', label: 'Git' },\n    { slug: 'flutter', label: 'Flutter' },\n  ];\n\n  state = { termInput: '', lines: [], openProj: 0, menuOpen: false };\n\n  glowRef = React.createRef();\n  termBodyRef = React.createRef();\n  inputRef = React.createRef();\n\n  data = [\n    { name: 'Enterprise RAG & AI Assistants', client: 'ABSA Group',\n      desc: 'The bank relied on siloed systems (Workday, ServiceNow, SharePoint) and legacy intent bots — creating bottlenecks across Internal Audit, Legal, Risk & Compliance, Employee Self-Service, and HR recruitment. Architected the multi-agent solution end-to-end.',\n      stack: ['React', 'Angular', 'AWS SageMaker', 'Copilot Studio', 'Multi-Agent Orchestration'],\n
